<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict customer churn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .h1 {font-family:Times New Roman;
            text-align: center;
        }
        .pos1 {
            text-align: center;
        }
        .result {
            text-align: center;
            color: {{color}};
        }

    </style>
</head>


<body>

    <div>
        <h1 class="h1"> Predict Customer Churn </h1>
        <hr/>
    </div>

    <form action="/predict" method="POST" enctype="multipart/form-data" class="pos1">
        <p>
            <input type="file" name="file" class="form-control-sm" id="file">
            <label class="form-label" for="file"> {{file_error}} </label>


        <input type="number" name="n_row" placeholder="Введите номер строки" class="form-control-sm">
         {{text_error}}
        </p>

        <button type="submit" class="btn btn-primary"> Загрузить на сервер </button>
        <p> <br/>
            <input type="checkbox" name="checkbox1" class="form-check-input" id="checkbox1">
            <label class="form-check-label" for="checkbox1"> Raw Data </label>
        </p>
    </form>

    <hr/>

    <div class="result">
        <p> {{ prediction_text }} </p>
    </div>






</body>


</html>
